name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SESSION_SECRET: ci-session-secret-1234567890-abcdef
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      SUPABASE_JWT_SECRET: ci-supabase-jwt-secret-1234567890
      GEMINI_API_KEY: ci-gemini-key
      GEMINI_MODEL: gemini-2.5-flash
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        env:
          NODE_ENV: production
        run: npm run build
